<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚗 Endless Drive</title>

<style>
body{margin:0;overflow:hidden;font-family:Arial;background:#111;color:white}
#game{width:100vw;height:100vh;position:relative;background:linear-gradient(#222,#111)}
.road{position:absolute;left:50%;top:0;transform:translateX(-50%);width:330px;height:100vh;background:#333;overflow:hidden}
.line{position:absolute;left:50%;width:10px;height:80px;background:white;border-radius:10px;transform:translateX(-50%)}
#car{position:absolute;bottom:55px;left:50%;transform:translateX(-50%);font-size:58px;z-index:5}
.enemy{position:absolute;font-size:52px;z-index:4}
#hud{position:fixed;top:15px;left:15px;right:15px;display:flex;justify-content:space-between;z-index:10}
.box{background:rgba(255,255,255,.14);backdrop-filter:blur(8px);padding:12px 16px;border-radius:18px;font-weight:900}
.screen{position:fixed;inset:0;background:linear-gradient(#111,#333);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;z-index:99}
#gameOver{display:none}
h1{font-size:44px;margin:8px}
p{color:#ddd}
button{border:0;background:#ff4d6d;color:white;padding:16px 28px;border-radius:999px;font-size:18px;font-weight:900}
.controls{position:fixed;bottom:20px;left:0;right:0;display:flex;justify-content:space-between;padding:0 30px;z-index:20;pointer-events:none}
.ctrl{width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:32px;pointer-events:auto}
</style>
</head>

<body>

<div id="game">
  <div class="road" id="road"></div>
  <div id="car">🚗</div>

  <div id="hud">
    <div class="box">ניקוד: <span id="score">0</span></div>
    <div class="box">שיא: <span id="best">0</span></div>
  </div>

  <div class="controls">
    <div class="ctrl" ontouchstart="left=true" ontouchend="left=false" onmousedown="left=true" onmouseup="left=false">⬅️</div>
    <div class="ctrl" ontouchstart="right=true" ontouchend="right=false" onmousedown="right=true" onmouseup="right=false">➡️</div>
  </div>
</div>

<div id="start" class="screen">
  <div style="font-size:100px">🚗</div>
  <h1>Endless Drive</h1>
  <p>תתחמק מהמכוניות ותשבור שיא</p>
  <button onclick="startGame()">התחל</button>
</div>

<div id="gameOver" class="screen">
  <div style="font-size:100px">💥</div>
  <h1>נפגעת!</h1>
  <p>הניקוד שלך: <span id="finalScore">0</span></p>
  <button onclick="restartGame()">שחק שוב</button>
</div>

<script>
const road=document.getElementById("road");
const car=document.getElementById("car");
const scoreEl=document.getElementById("score");
const bestEl=document.getElementById("best");

let carX=window.innerWidth/2;
let left=false,right=false;
let score=0;
let best=localStorage.getItem("driveBest")||0;
let speed=4;
let running=false;
let enemyTimer;

bestEl.innerText=best;

for(let i=0;i<8;i++){
  const line=document.createElement("div");
  line.className="line";
  line.style.top=(i*140)+"px";
  road.appendChild(line);
}

function startGame(){
  document.getElementById("start").style.display="none";
  reset();
  running=true;
  enemyTimer=setInterval(createEnemy,950);
  requestAnimationFrame(loop);
}

function restartGame(){
  document.querySelectorAll(".enemy").forEach(e=>e.remove());
  document.getElementById("gameOver").style.display="none";
  reset();
  running=true;
  enemyTimer=setInterval(createEnemy,950);
  requestAnimationFrame(loop);
}

function reset(){
  carX=window.innerWidth/2;
  score=0;
  speed=4;
  scoreEl.innerText=score;
}

function createEnemy(){
  if(!running)return;
  const enemy=document.createElement("div");
  enemy.className="enemy";
  enemy.innerText=["🚙","🚕","🚓"][Math.floor(Math.random()*3)];
  const roadLeft=(window.innerWidth-330)/2;
  enemy.style.left=(roadLeft+35+Math.random()*240)+"px";
  enemy.style.top="-70px";
  document.getElementById("game").appendChild(enemy);
}

function loop(){
  if(!running)return;

  if(left)carX-=6;
  if(right)carX+=6;

  const roadLeft=(window.innerWidth-330)/2;
  const roadRight=roadLeft+330;

  if(carX<roadLeft+35)carX=roadLeft+35;
  if(carX>roadRight-35)carX=roadRight-35;

  car.style.left=carX+"px";

  document.querySelectorAll(".line").forEach(line=>{
    let y=line.offsetTop+speed;
    if(y>window.innerHeight)y=-100;
    line.style.top=y+"px";
  });

  document.querySelectorAll(".enemy").forEach(enemy=>{
    let y=enemy.offsetTop+speed;
    enemy.style.top=y+"px";

    const a=enemy.getBoundingClientRect();
    const b=car.getBoundingClientRect();

    if(a.bottom>b.top && a.top<b.bottom && a.left<b.right && a.right>b.left){
      endGame();
    }

    if(y>window.innerHeight){
      enemy.remove();
      score++;
      scoreEl.innerText=score;

      if(score>best){
        best=score;
        localStorage.setItem("driveBest",best);
        bestEl.innerText=best;
      }

      if(score%8===0)speed+=0.5;
    }
  });

  requestAnimationFrame(loop);
}

function endGame(){
  running=false;
  clearInterval(enemyTimer);
  document.getElementById("finalScore").innerText=score;
  document.getElementById("gameOver").style.display="flex";
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft")left=true;
  if(e.key==="ArrowRight")right=true;
});

document.addEventListener("keyup",e=>{
  if(e.key==="ArrowLeft")left=false;
  if(e.key==="ArrowRight")right=false;
});
</script>

</body>
</html>.
