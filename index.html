<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚗 Drive Survival</title>

<style>
*{box-sizing:border-box}
body{margin:0;overflow:hidden;font-family:Arial;background:#101014;color:white}
#game{width:100vw;height:100vh;position:relative;background:linear-gradient(#1b1b28,#08080d)}
.road{position:absolute;left:50%;top:0;transform:translateX(-50%);width:340px;height:100vh;background:#303038;overflow:hidden;border-left:6px solid #555;border-right:6px solid #555}
.line{position:absolute;left:50%;width:10px;height:80px;background:white;border-radius:99px;transform:translateX(-50%);opacity:.85}
#player{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);font-size:58px;z-index:5;filter:drop-shadow(0 12px 14px rgba(0,0,0,.45))}
.enemy,.coin,.laser,.shieldItem{position:absolute;z-index:4}
.enemy{font-size:54px}
.coin{font-size:34px}
.shieldItem{font-size:36px}
.laser{width:7px;height:34px;background:#00e5ff;border-radius:999px;box-shadow:0 0 18px #00e5ff;z-index:6}
#hud{position:fixed;top:12px;left:10px;right:10px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;z-index:20}
.box{background:rgba(255,255,255,.13);backdrop-filter:blur(8px);padding:9px;border-radius:16px;font-weight:900;text-align:center;font-size:14px}
.screen{position:fixed;inset:0;background:linear-gradient(#111,#2c2c3a);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;z-index:99;padding:20px}
#gameOver{display:none}
.logo{font-size:100px;animation:float 2s infinite}
@keyframes float{50%{transform:translateY(-12px)}}
h1{font-size:42px;margin:8px}
p{color:#ddd;max-width:340px}
button{border:0;background:linear-gradient(135deg,#ff4d6d,#ff758f);color:white;padding:15px 24px;border-radius:999px;font-size:17px;font-weight:900;margin:6px;cursor:pointer;box-shadow:0 12px 25px rgba(255,77,109,.25)}
.controls{position:fixed;bottom:18px;left:0;right:0;display:flex;justify-content:space-between;padding:0 24px;z-index:30;pointer-events:none}
.ctrl{width:68px;height:68px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:30px;pointer-events:auto;box-shadow:0 12px 24px rgba(0,0,0,.35);user-select:none}
#shoot{position:fixed;bottom:95px;left:50%;transform:translateX(-50%);width:72px;height:72px;border-radius:50%;background:#111;display:flex;align-items:center;justify-content:center;font-size:32px;z-index:30;box-shadow:0 12px 24px rgba(0,0,0,.35)}
#shop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(10px);z-index:120;padding:20px;overflow:auto}
.shopCard{background:white;color:#111;max-width:430px;margin:auto;border-radius:28px;padding:20px;text-align:center}
.upgrade{display:flex;justify-content:space-between;align-items:center;background:#f3f3f3;border-radius:18px;padding:12px;margin:10px 0;text-align:right}
.buy{background:#111;color:white;padding:10px 14px;font-size:14px}
.pop{position:absolute;font-size:24px;z-index:40;animation:pop .6s forwards;pointer-events:none}
@keyframes pop{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-35px) scale(1.4)}}
.shieldGlow{filter:drop-shadow(0 0 18px #00e5ff)}
</style>
</head>

<body>

<div id="game">
  <div class="road" id="road"></div>

  <div id="hud">
    <div class="box">🏁 ניקוד: <span id="score">0</span></div>
    <div class="box">🪙 מטבעות: <span id="coins">0</span></div>
    <div class="box">❤️ חיים: <span id="lives">3</span></div>
  </div>

  <div id="player">🏎️</div>

  <div class="controls">
    <div class="ctrl" ontouchstart="left=true" ontouchend="left=false" onmousedown="left=true" onmouseup="left=false">⬅️</div>
    <div class="ctrl" ontouchstart="right=true" ontouchend="right=false" onmousedown="right=true" onmouseup="right=false">➡️</div>
  </div>

  <div id="shoot" onclick="shootLaser()">🔫</div>
</div>

<div id="start" class="screen">
  <div class="logo">🏎️</div>
  <h1>Drive Survival</h1>
  <p>אסוף מטבעות, התחמק ממכוניות, קנה שדרוגים ותירה באויבים.</p>
  <button onclick="startGame()">התחל משחק</button>
  <button onclick="openShop()">🛒 חנות</button>
</div>

<div id="gameOver" class="screen">
  <div class="logo">💥</div>
  <h1>נפגעת!</h1>
  <p>הניקוד שלך: <b id="finalScore">0</b></p>
  <button onclick="restartGame()">שחק שוב</button>
  <button onclick="openShop()">🛒 חנות שדרוגים</button>
</div>

<div id="shop">
  <div class="shopCard">
    <h1>🛒 חנות</h1>
    <p>יש לך <b id="shopCoins">0</b> מטבעות</p>

    <div class="upgrade">
      <div>⚡ מנוע מהיר<br><small>מחיר: 25</small></div>
      <button class="buy" onclick="buyUpgrade('speed',25)">קנה</button>
    </div>

    <div class="upgrade">
      <div>❤️ עוד חיים<br><small>מחיר: 40</small></div>
      <button class="buy" onclick="buyUpgrade('life',40)">קנה</button>
    </div>

    <div class="upgrade">
      <div>🔫 לייזר<br><small>מחיר: 80</small></div>
      <button class="buy" onclick="buyUpgrade('laser',80)">קנה</button>
    </div>

    <div class="upgrade">
      <div>🛡️ מגן התחלתי<br><small>מחיר: 120</small></div>
      <button class="buy" onclick="buyUpgrade('shield',120)">קנה</button>
    </div>

    <button onclick="closeShop()">סגור</button>
  </div>
</div>

<script>
const road=document.getElementById("road");
const player=document.getElementById("player");

let score=0;
let coins=Number(localStorage.getItem("driveCoins"))||0;
let lives=3;
let carX=window.innerWidth/2;
let left=false,right=false;
let running=false;
let speed=3.2;
let playerSpeed=5.2;
let enemyTimer,coinTimer,shieldTimer;

let upgrades=JSON.parse(localStorage.getItem("driveUpgrades"))||{
  speed:0,
  life:0,
  laser:false,
  shield:false
};

for(let i=0;i<8;i++){
  const line=document.createElement("div");
  line.className="line";
  line.style.top=(i*140)+"px";
  road.appendChild(line);
}

function updateUI(){
  document.getElementById("score").innerText=score;
  document.getElementById("coins").innerText=coins;
  document.getElementById("lives").innerText=lives;
  document.getElementById("shopCoins").innerText=coins;
}

updateUI();

function resetGame(){
  document.querySelectorAll(".enemy,.coin,.laser,.shieldItem,.pop").forEach(e=>e.remove());
  score=0;
  lives=3+upgrades.life;
  speed=3.2;
  playerSpeed=5.2+(upgrades.speed*0.9);
  carX=window.innerWidth/2;
  player.classList.toggle("shieldGlow", upgrades.shield);
  updateUI();
}

function startGame(){
  document.getElementById("start").style.display="none";
  resetGame();
  running=true;
  enemyTimer=setInterval(createEnemy,1050);
  coinTimer=setInterval(createCoin,850);
  shieldTimer=setInterval(createShield,9000);
  requestAnimationFrame(loop);
}

function restartGame(){
  document.getElementById("gameOver").style.display="none";
  resetGame();
  running=true;
  enemyTimer=setInterval(createEnemy,1050);
  coinTimer=setInterval(createCoin,850);
  shieldTimer=setInterval(createShield,9000);
  requestAnimationFrame(loop);
}

function roadBounds(){
  const roadLeft=(window.innerWidth-340)/2;
  return {left:roadLeft+35,right:roadLeft+305};
}

function createEnemy(){
  if(!running)return;
  const e=document.createElement("div");
  e.className="enemy";
  e.innerText=["🚙","🚕","🚓","🚚"][Math.floor(Math.random()*4)];
  const b=roadBounds();
  e.style.left=(b.left+Math.random()*(b.right-b.left-40))+"px";
  e.style.top="-70px";
  document.getElementById("game").appendChild(e);
}

function createCoin(){
  if(!running)return;
  const c=document.createElement("div");
  c.className="coin";
  c.innerText=Math.random()<0.15?"💎":"🪙";
  c.dataset.value=c.innerText==="💎"?5:1;
  const b=roadBounds();
  c.style.left=(b.left+Math.random()*(b.right-b.left-30))+"px";
  c.style.top="-50px";
  document.getElementById("game").appendChild(c);
}

function createShield(){
  if(!running || Math.random()>0.4)return;
  const s=document.createElement("div");
  s.className="shieldItem";
  s.innerText="🛡️";
  const b=roadBounds();
  s.style.left=(b.left+Math.random()*(b.right-b.left-35))+"px";
  s.style.top="-50px";
  document.getElementById("game").appendChild(s);
}

function shootLaser(){
  if(!running || !upgrades.laser)return;
  const l=document.createElement("div");
  l.className="laser";
  l.style.left=carX+"px";
  l.style.top=(window.innerHeight-145)+"px";
  document.getElementById("game").appendChild(l);
}

function pop(x,y,text){
  const p=document.createElement("div");
  p.className="pop";
  p.innerText=text;
  p.style.left=x+"px";
  p.style.top=y+"px";
  document.getElementById("game").appendChild(p);
  setTimeout(()=>p.remove(),600);
}

function hit(a,b){
  return a.bottom>b.top && a.top<b.bottom && a.left<b.right && a.right>b.left;
}

function loop(){
  if(!running)return;

  if(left)carX-=playerSpeed;
  if(right)carX+=playerSpeed;

  const b=roadBounds();
  if(carX<b.left)carX=b.left;
  if(carX>b.right)carX=b.right;

  player.style.left=carX+"px";

  document.querySelectorAll(".line").forEach(line=>{
    let y=line.offsetTop+speed;
    if(y>window.innerHeight)y=-100;
    line.style.top=y+"px";
  });

  moveCoins();
  moveEnemies();
  moveLasers();
  moveShields();

  requestAnimationFrame(loop);
}

function moveCoins(){
  document.querySelectorAll(".coin").forEach(c=>{
    let y=c.offsetTop+speed;
    c.style.top=y+"px";

    if(hit(c.getBoundingClientRect(),player.getBoundingClientRect())){
      const val=Number(c.dataset.value);
      pop(c.offsetLeft,c.offsetTop,"+"+val+" 🪙");
      coins+=val;
      score+=val;
      localStorage.setItem("driveCoins",coins);
      c.remove();
      updateUI();
      if(score%20===0)speed+=0.25;
    }

    if(y>window.innerHeight)c.remove();
  });
}

function moveShields(){
  document.querySelectorAll(".shieldItem").forEach(s=>{
    let y=s.offsetTop+speed;
    s.style.top=y+"px";

    if(hit(s.getBoundingClientRect(),player.getBoundingClientRect())){
      upgrades.shield=true;
      player.classList.add("shieldGlow");
      s.remove();
      pop(player.offsetLeft,player.offsetTop,"מגן 🛡️");
    }

    if(y>window.innerHeight)s.remove();
  });
}

function moveEnemies(){
  document.querySelectorAll(".enemy").forEach(e=>{
    let y=e.offsetTop+(speed+0.4);
    e.style.top=y+"px";

    if(hit(e.getBoundingClientRect(),player.getBoundingClientRect())){
      e.remove();

      if(upgrades.shield){
        upgrades.shield=false;
        player.classList.remove("shieldGlow");
        pop(player.offsetLeft,player.offsetTop,"נחסם 🛡️");
      }else{
        lives--;
        updateUI();
        if(lives<=0)endGame();
      }
    }

    if(y>window.innerHeight){
      e.remove();
      score++;
      updateUI();
      if(score%15===0)speed+=0.35;
    }
  });
}

function moveLasers(){
  document.querySelectorAll(".laser").forEach(l=>{
    let y=l.offsetTop-10;
    l.style.top=y+"px";

    document.querySelectorAll(".enemy").forEach(e=>{
      if(hit(l.getBoundingClientRect(),e.getBoundingClientRect())){
        pop(e.offsetLeft,e.offsetTop,"+3 💥");
        e.remove();
        l.remove();
        score+=3;
        coins+=2;
        localStorage.setItem("driveCoins",coins);
        updateUI();
      }
    });

    if(y<0)l.remove();
  });
}

function endGame(){
  running=false;
  clearInterval(enemyTimer);
  clearInterval(coinTimer);
  clearInterval(shieldTimer);
  document.getElementById("finalScore").innerText=score;
  document.getElementById("gameOver").style.display="flex";
}

function openShop(){
  updateUI();
  document.getElementById("shop").style.display="block";
}

function closeShop(){
  document.getElementById("shop").style.display="none";
}

function buyUpgrade(type,price){
  if(coins<price){
    alert("אין מספיק מטבעות");
    return;
  }

  coins-=price;

  if(type==="speed")upgrades.speed++;
  if(type==="life")upgrades.life++;
  if(type==="laser")upgrades.laser=true;
  if(type==="shield")upgrades.shield=true;

  localStorage.setItem("driveCoins",coins);
  localStorage.setItem("driveUpgrades",JSON.stringify(upgrades));
  updateUI();
  alert("נקנה!");
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft")left=true;
  if(e.key==="ArrowRight")right=true;
  if(e.key===" ")shootLaser();
});

document.addEventListener("keyup",e=>{
  if(e.key==="ArrowLeft")left=false;
  if(e.key==="ArrowRight")right=false;
});
</script>

</body>
</html>
