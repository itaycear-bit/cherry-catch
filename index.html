<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍒 Cherry Catch 2.0</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  overflow:hidden;
  font-family:Arial,sans-serif;
  background:radial-gradient(circle at top,#fff7fa,#ffdbe6 45%,#f7f7f7);
}

#game{
  width:100vw;
  height:100vh;
  position:relative;
}

.hud{
  position:fixed;
  top:14px;
  left:14px;
  right:14px;
  display:flex;
  justify-content:space-between;
  gap:10px;
  z-index:20;
}

.box{
  background:rgba(255,255,255,.8);
  backdrop-filter:blur(10px);
  padding:10px 14px;
  border-radius:18px;
  box-shadow:0 10px 24px rgba(0,0,0,.12);
  font-weight:900;
  font-size:15px;
}

#player{
  position:absolute;
  bottom:35px;
  left:50%;
  transform:translateX(-50%);
  width:105px;
  height:55px;
  border-radius:0 0 45px 45px;
  background:linear-gradient(180deg,#3a2a22,#151515);
  box-shadow:0 18px 30px rgba(0,0,0,.28);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:34px;
}

#player:before{
  content:"";
  position:absolute;
  top:-13px;
  width:105px;
  height:25px;
  border:5px solid #2b201b;
  border-bottom:0;
  border-radius:50px 50px 0 0;
}

.cherry{
  position:absolute;
  font-size:30px;
  filter:drop-shadow(0 8px 8px rgba(0,0,0,.18));
}

.catchPop{
  position:absolute;
  font-size:24px;
  pointer-events:none;
  animation:popUp .5s ease forwards;
}

@keyframes popUp{
  from{opacity:1;transform:translateY(0) scale(1)}
  to{opacity:0;transform:translateY(-35px) scale(1.4)}
}

.screen{
  position:fixed;
  inset:0;
  background:linear-gradient(180deg,#fff,#ffe4ee);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:99;
  text-align:center;
  padding:24px;
}

#gameOver{display:none}

.logo{
  font-size:120px;
  filter:drop-shadow(0 18px 24px rgba(255,77,109,.25));
  animation:float 2s infinite;
}

@keyframes float{
  50%{transform:translateY(-12px)}
}

h1{
  font-size:44px;
  margin:8px 0;
}

p{
  color:#555;
  font-size:17px;
  max-width:330px;
}

button{
  border:0;
  background:linear-gradient(135deg,#ff4d6d,#ff758f);
  color:white;
  padding:16px 28px;
  border-radius:999px;
  font-size:18px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 14px 28px rgba(255,77,109,.35);
  margin-top:15px;
}

#controls{
  position:fixed;
  bottom:18px;
  left:0;
  right:0;
  display:flex;
  justify-content:space-between;
  padding:0 24px;
  z-index:30;
  pointer-events:none;
}

.controlBtn{
  width:66px;
  height:66px;
  border-radius:50%;
  background:rgba(17,17,17,.82);
  color:white;
  font-size:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:auto;
  user-select:none;
  box-shadow:0 12px 24px rgba(0,0,0,.25);
}

#combo{
  position:fixed;
  top:48%;
  left:50%;
  transform:translate(-50%,-50%) scale(.8);
  font-size:42px;
  font-weight:900;
  color:#ff4d6d;
  opacity:0;
  pointer-events:none;
  z-index:40;
  text-shadow:0 8px 22px rgba(255,77,109,.35);
  transition:.25s;
}

.cloud{
  position:absolute;
  color:rgba(255,255,255,.8);
  font-size:70px;
  animation:cloudMove 18s linear infinite;
}

@keyframes cloudMove{
  from{transform:translateX(-120px)}
  to{transform:translateX(110vw)}
}
</style>
</head>

<body>

<div id="game">
  <div class="cloud" style="top:90px;animation-delay:0s">☁️</div>
  <div class="cloud" style="top:170px;animation-delay:6s">☁️</div>

  <div class="hud">
    <div class="box">🍒 ניקוד: <span id="score">0</span></div>
    <div class="box">🏆 שיא: <span id="bestScore">0</span></div>
    <div class="box">❤️ חיים: <span id="lifeCount">3</span></div>
  </div>

  <div id="player">🧺</div>
  <div id="combo">COMBO 🔥</div>

  <div id="controls">
    <div class="controlBtn"
      ontouchstart="moveLeft=true"
      ontouchend="moveLeft=false"
      onmousedown="moveLeft=true"
      onmouseup="moveLeft=false">⬅️</div>

    <div class="controlBtn"
      ontouchstart="moveRight=true"
      ontouchend="moveRight=false"
      onmousedown="moveRight=true"
      onmouseup="moveRight=false">➡️</div>
  </div>
</div>

<div id="startScreen" class="screen">
  <div class="logo">🍒</div>
  <h1>Cherry Catch</h1>
  <p>תפוס דובדבנים, צבור קומבו, ושבור את השיא שלך.</p>
  <button onclick="startGame()">התחל משחק</button>
</div>

<div id="gameOver" class="screen">
  <div class="logo">💔</div>
  <h1>המשחק נגמר</h1>
  <p>הניקוד שלך: <b id="finalScore">0</b></p>
  <button onclick="restartGame()">שחק שוב</button>
</div>

<script>
let score=0;
let lives=3;
let best=localStorage.getItem("bestCherry") || 0;

let playerX=window.innerWidth/2;
let moveLeft=false;
let moveRight=false;
let gameRunning=false;

let cherryInterval;
let speed=1.7;
let combo=0;

const player=document.getElementById("player");
const scoreEl=document.getElementById("score");
const livesEl=document.getElementById("lifeCount");
const bestEl=document.getElementById("bestScore");
const comboEl=document.getElementById("combo");

bestEl.innerText=best;

function startGame(){
  document.getElementById("startScreen").style.display="none";
  resetValues();
  gameRunning=true;
  cherryInterval=setInterval(createCherry,1200);
  requestAnimationFrame(gameLoop);
}

function restartGame(){
  document.querySelectorAll(".cherry,.catchPop").forEach(e=>e.remove());
  document.getElementById("gameOver").style.display="none";
  resetValues();
  gameRunning=true;
  cherryInterval=setInterval(createCherry,1200);
  requestAnimationFrame(gameLoop);
}

function resetValues(){
  score=0;
  lives=3;
  speed=1.7;
  combo=0;
  playerX=window.innerWidth/2;

  scoreEl.innerText=score;
  livesEl.innerText=lives;
  bestEl.innerText=best;
}

function createCherry(){
  if(!gameRunning)return;

  const cherry=document.createElement("div");
  cherry.className="cherry";
  cherry.innerText="🍒";
  cherry.style.left=Math.random()*(window.innerWidth-45)+"px";
  cherry.style.top="-50px";

  document.getElementById("game").appendChild(cherry);
}

function showCombo(){
  comboEl.style.opacity="1";
  comboEl.style.transform="translate(-50%,-50%) scale(1.15)";

  setTimeout(()=>{
    comboEl.style.opacity="0";
    comboEl.style.transform="translate(-50%,-50%) scale(.8)";
  },450);
}

function catchEffect(x,y){
  const pop=document.createElement("div");
  pop.className="catchPop";
  pop.innerText="+1 🍒";
  pop.style.left=x+"px";
  pop.style.top=y+"px";
  document.getElementById("game").appendChild(pop);

  setTimeout(()=>pop.remove(),500);
}

function gameLoop(){
  if(!gameRunning)return;

  if(moveLeft)playerX-=5;
  if(moveRight)playerX+=5;

  if(playerX<52)playerX=52;
  if(playerX>window.innerWidth-52)playerX=window.innerWidth-52;

  player.style.left=playerX+"px";

  document.querySelectorAll(".cherry").forEach(cherry=>{
    let y=cherry.offsetTop+speed;
    cherry.style.top=y+"px";

    const c=cherry.getBoundingClientRect();
    const p=player.getBoundingClientRect();

    if(
      c.bottom>=p.top &&
      c.left<p.right &&
      c.right>p.left
    ){
      catchEffect(c.left,c.top);
      cherry.remove();

      score++;
      combo++;
      scoreEl.innerText=score;

      if(score>best){
        best=score;
        localStorage.setItem("bestCherry",best);
        bestEl.innerText=best;
      }

      if(combo>=5)showCombo();

      if(score%12===0){
        speed+=0.35;
      }
    }

    if(y>window.innerHeight){
      cherry.remove();
      lives--;
      combo=0;
      livesEl.innerText=lives;

      if(lives<=0){
        endGame();
      }
    }
  });

  requestAnimationFrame(gameLoop);
}

function endGame(){
  gameRunning=false;
  clearInterval(cherryInterval);
  document.getElementById("finalScore").innerText=score;
  document.getElementById("gameOver").style.display="flex";
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft")moveLeft=true;
  if(e.key==="ArrowRight")moveRight=true;
});

document.addEventListener("keyup",e=>{
  if(e.key==="ArrowLeft")moveLeft=false;
  if(e.key==="ArrowRight")moveRight=false;
});
</script>

</body>
</html>
